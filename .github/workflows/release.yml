name: Upload ISO to Release

on:
  push:
    tags:
      - 'v*'

jobs:
  upload-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download ISO file
        run: |
          echo "ISO files should be built locally and uploaded via GitHub CLI or manually"
          echo "This workflow expects ISO to be present in out/ directory"

      - name: Find ISO file
        id: find_iso
        run: |
          ISO_FILE=$(find out/ -name "*.iso" -type f | head -n 1)
          if [ -z "$ISO_FILE" ]; then
            echo "No ISO file found in out/ directory"
            exit 1
          fi
          echo "iso_file=$ISO_FILE" >> $GITHUB_OUTPUT
          echo "Found ISO: $ISO_FILE"

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload ISO to Release
        uses: softprops/action-gh-release@v1
        with:
          files: out/*.iso
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
